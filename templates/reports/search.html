{% extends "base.html" %}
{% block title %}Voucher Search — CollMgm{% endblock %}
{% block content %}
<h2 class="page-heading">Voucher Search</h2>

<form method="get" action="/reports/search" class="search-form">
  <input type="search" name="q" value="{{ q }}" placeholder="Bill number…"
         inputmode="numeric" autocomplete="off" autofocus>
  <button type="submit" class="btn btn-primary">Search</button>
</form>

{% if error %}
  <p class="alert alert-error">{{ error }}</p>
{% endif %}

{% if result %}
  {% set voucher, installments, is_completed = result %}
  {% include "_voucher_card.html" %}
{% endif %}

<a class="btn btn-secondary" href="/reports">Back</a>
{% endblock %}
