{% extends "base.html" %}
{% block title %}Generate Collection List — CollMgm{% endblock %}
{% block content %}
<h2 class="page-heading">Generate Collection List</h2>
<p class="step-label">Select beat</p>

{% if error %}
  <p class="alert alert-error">{{ error }}</p>
{% endif %}

<form method="post" action="/coll/start/beat">
  <div class="form-group">
    <label for="beat">Beat</label>
    <select id="beat" name="beat" required>
      <option value="">— choose —</option>
      {% for b in beats %}
        <option value="{{ b }}" {% if active.get(b) %}disabled{% endif %}>{{ b }}
          {%- if summary.get(b) %} ({{ summary[b]["total"] }} vouchers){% endif %}
          {%- if active.get(b) %} — {{ active[b] }}{% endif %}
        </option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-primary">Next</button>
  <a class="btn btn-secondary" href="/menu">Cancel</a>
</form>
{% endblock %}
